name: Deploy API to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the repository directory
            cd ~/backup-teams || exit 1
            
            # Pull the latest changes from main
            git pull origin main
            
            # SECRETS MANAGEMENT
            # Install AWS CLI if it is missing on the EC2 server
            if ! command -v aws &> /dev/null; then
               echo "AWS CLI not found. Installing..."
               sudo apt-get update -y && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y awscli
            fi

            # Fetch the entire .env file blob securely from AWS Parameter Store
            # and write it to the local .env file so Docker can read it.
            echo "Fetching secrets from AWS SSM..."
            aws ssm get-parameter \
              --name "/backup-teams/prod/dotenv" \
              --with-decryption \
              --region us-east-1 \
              --query "Parameter.Value" \
              --output text > .env
              
            # Ensure the permissions are strict (only the owner can read it)
            chmod 600 .env
            
            # Rebuild and restart all containers (Nginx + API)
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Apply database migrations automatically against RDS
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
